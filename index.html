<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשומה הסיעודית</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #4f46e5;
      --accent2: #818cf8;
      --soft: #eef2ff;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
    }
    body { font-family: 'Assistant', sans-serif; background: #f1f5f9; color: #1e293b; }
    .module-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 2rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    /* Top progress */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      background: rgba(241,245,249,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(226,232,240,0.8);
    }
    .progress-bar { height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s ease;
    }
    .progress-ring {
      width: 44px; height: 44px;
      display: grid; place-items: center;
      border-radius: 999px;
      background: white;
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.06);
    }
    .ring-text {
      font-size: 11px;
      font-weight: 900;
      color: #0f172a;
    }

    /* Sidebar */
    .sidebar {
      position: sticky;
      top: 84px;
      height: calc(100vh - 84px);
      overflow: auto;
      border-radius: 1.5rem;
      border: 1px solid rgba(226,232,240,0.9);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
    }
    .side-item {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      padding: 0.75rem 0.9rem;
      border-radius: 1rem;
      transition: transform 0.15s ease, background 0.15s ease;
      border: 1px solid transparent;
    }
    .side-item:hover { background: rgba(226,232,240,0.5); transform: translateY(-1px); }
    .side-item.active {
      background: var(--soft);
      border-color: rgba(0,0,0,0.05);
    }
    .side-icon {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border-radius: 12px;
      background: var(--soft);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .side-title {
      font-weight: 800;
      font-size: 0.95rem;
      color: #0f172a;
      line-height: 1.2;
    }
    .side-sub {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.1rem;
    }
    .accent-pill {
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    /* Existing interactive components */
    .flashcard { perspective: 1000px; height: 200px; cursor: pointer; }
    .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; border-radius: 1.5rem; text-align: center;
    }
    .flashcard-front { background: #f8fafc; border: 2px solid #e2e8f0; font-weight: bold; }
    .flashcard-back { background: var(--accent); color: white; transform: rotateY(180deg); }

    .step-bubble {
      width: 40px; height: 40px; background: var(--accent); color: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 900; margin-bottom: 1rem;
    }

    .option-btn { transition: all 0.2s; border: 2px solid #e2e8f0; }
    .option-btn:hover { border-color: var(--accent); background: var(--soft); }
    .option-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; }
    .option-btn.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }

    .btn-primary {
      background: var(--accent);
    }
    .btn-primary:hover {
      filter: brightness(0.95);
    }
  </style>
</head>

    const moduleData = {"title":"הרשומה הסיעודית","intro":{"title":"ברוכים הבאים ללומדת \"הרשומה הסיעודית\"!","text":"בלומדה זו נעמיק במשמעותה של הרשומה הסיעודית ככלי קליני ומשפטי מרכזי. נכיר את עקרונות הכתיבה המקצועית, הכללים לתיעוד מדויק ואובייקטיבי, ואת ההיבטים המשפטיים של הרשומה.","btn":"מתחילים ללמוד"},"outro":{"title":"כל הכבוד! סיימתם את הלומדה.","text":"כעת אתם מכירים את העקרונות המרכזיים של הרשומה הסיעודית. זכרו: \"מה שלא תועד – לא נעשה\". הקפדה על רשומה איכותית היא הבסיס לטיפול רפואי בטוח ומקצועי.","btn":"סיום הלומדה"},"units":[{"title":"ההיבט המשפטי של הרשומה הסיעודית","desc":"הכרת המסגרת החוקית, חוק זכויות החולה ועקרון \"הנזק הראייתי\" בתיעוד הסיעודי","subUnits":[{"title":"הרשומה כראיה משפטית","type":"text","content":"הרשומה הסיעודית היא חלק בלתי נפרד מהרשומה הרפואית ומהווה מסמך קליני-משפטי מחייב. היא משמשת כראיה מרכזית בהליכים משפטיים, משמעתיים או בוועדות בדיקה. \nזכרו: חלה עליכם חובה מקצועית לתיעוד מלא, אובייקטיבי ובזמן אמת.","actType":"tf","actQ":"במקרה של תביעה משפטית, אם פעולה סיעודית בוצעה אך לא תועדה ברשומה, נטל ההוכחה שהפעולה אכן בוצעה מוטל על המוסד הרפואי או על איש הצוות","actData":"","actOpts":[],"actAns":"true"},{"title":"המסגרת החוקית","type":"flashcards","content":"חובת ניהול רשומה | על פי סעיף 17 לחוק זכויות החולה, כל מטפל מחויב לתעד את מהלך הטיפול, האבחנות וההוראות. אי תיעוד נחשב כהפרת חובה חוקית.\nזכות לעיון | סעיף 18 קובע כי למטופל זכות לעיין ברשומה ולקבל העתק. לכן התיעוד חייב להיות ענייני, מכבד וללא ביטויים שיפוטיים.\nסודיות רפואית | סעיף 19 מחייב שמירה על סודיות המידע הרפואי. אין להעביר מידע לגורם שאינו מעורב בטיפול ללא הסכמה או צו שיפוטי.\nחוק טיפול בחולי נפש | הרשומה משמשת בסיס להחלטות קריטיות כגון אשפוז כפוי, בדיקה פסיכיאטרית ונקיטת אמצעי הגבלה.","actType":"mcq","actQ":"על פי סעיף 17 לחוק זכויות החולה, מהי המשמעות של הימנעות מתיעוד מהלך הטיפול?","actData":"","actOpts":["אי תיעוד נחשב כהפרת חובה חוקית ועלול להתפרש כהתרשלות מקצועית.","מדובר בהמלצה מקצועית בלבד ואינה מהווה עבירה על החוק.","חובת התיעוד חלה רק במקרים של טיפולים פולשניים או ניתוחים.","אי תיעוד מותר במידה והצוות היה תחת עומס עבודה חריג."],"actAns":""},{"title":"עקרונות מחייבים בתיעוד","type":"list","content":"דוקטרינת הנזק הראייתי: פעולה שלא תועדה – תיחשב כאילו לא בוצעה.\nתיעוד בזמן אמת: יש לבצע את התיעוד סמוך ככל האפשר לאירוע.\nדיוק ואובייקטיביות: תיאור עובדות נצפות בלבד (לדוגמה: \"המטופל צעק\" במקום \"המטופל אלים\").\nאיסור מחיקה: אין להשתמש בטיפקס או למחוק מידע בתיעוד ידני.","actType":"tf","actQ":"לפי דוקטרינת הנזק הראייתי, אם פעולה לא תועדה, נטל ההוכחה שהיא בוצעה עובר אל איש הצוות","actData":"","actOpts":[],"actAns":"true"},{"title":"במערכת הפסיכיאטרית, נקיטת אמצעים כמו הגבלה מכנית, בידוד או השגחה מיוחדת מהווה פגיעה משמעותית באוטונומיה של המטופל. לכן, קיימת חובה לתיעוד קפדני הכולל את המרכיבים הבאים","type":"list","content":"הנמקה מקצועית: הסבר מפורט מדוע הוחלט על נקיטת האמצעי.\nתיאור מצב המטופל: פירוט מצבו הקליני וההתנהגותי של המטופל טרם הפעלת האמצעי.\nפירוט התערבויות קודמות: תיאור הניסיונות וההתערבויות שבוצעו כדי למנוע את הצורך בהגבלה.\nמעקב שוטף: תיעוד המעקב והבדיקות בזמן השימוש באמצעי, בהתאם לנהלים המחמירים.\nהערכה מחודשת: תיעוד ניסיונות לשחרור המטופל מההגבלה והערכות מצב תקופתיות.\nזכרו: אי תיעוד מספק במצבים אלו עלול להיחשב כרשלנות חמורה בביקורת ובבית המשפט.","actType":"mcq","actQ":"בעת תיעוד של הגבלה מכנית (קשירה) במחלקה פסיכיאטרית, מה מחויב איש הצוות לציין בנוסף להחלטה עצמה?","actData":"","actOpts":["פירוט ההתערבויות שבוצעו טרם ההחלטה ותיאור ניסיונות לשחרור מההגבלה","רק את שעת תחילת ההגבלה ושעת הסיום המשוערת.","אין צורך בפירוט נוסף אם קיימת הוראה חתומה על ידי רופא.","תיאור קצר של מצב המטופל בסיום המשמרת בלבד."],"actAns":""},{"title":"דיווח על אירועים חריגים","type":"text","content":"בהתאם לנהלי משרד הבריאות, קיימת חובה לדווח ולתעד אירועים חריגים , אי דיווח מהווה הפרה מקצועית ועלול לגרור אחריות משמעתית","actType":"tf","actQ":"בתיעוד של נקיטת אמצעי הגבלה מכנית (כמו קשירה), מספיק לציין את סוג ההגבלה ואת שעת ההתחלה, ואין חובה לתעד את הניסיונות שנעשו כדי למנוע את ההגבלה טרם הפעלתה","actData":"","actOpts":[],"actAns":"false"}]},{"title":"מודלים מרכזיים לדיווח סיעודי","desc":"הכרת מודלים מובנים (SOAP, DAR, PIE) לארגון מידע קליני בצורה שיטתית, בהירה ואחידה התורמת לרצף הטיפולי ולהגנה משפטית.","subUnits":[{"title":"מודל SOAP","type":"flashcards","content":"S – Subjective (סובייקטיבי) | דברי המטופל כפי שנמסרו על ידו (תחושות, תלונות, ציטוטים). דוגמה: \"השכנים משתילים לי מחשבות\".\nO – Objective (אובייקטיבי) | ממצאים נצפים ומדידים (סימנים חיוניים, סטטוס פסיכיאטרי, התנהגות). דוגמה: נראה מתוח, אי שקט פסיכומוטורי.\nA – Assessment (הערכה) | ניתוח מקצועי המבוסס על הנתונים שנאספו. דוגמה: החמרה במצב פסיכוטי עם מחשבות שווא.\nP – Plan (תוכנית טיפולית) | הצעדים שהוחלט עליהם לאחר ההערכה. דוגמה: התחלת טיפול אנטי-פסיכוטי והשגחה.\nמתי להשתמש? | מתאים במיוחד לקבלת מטופל, הערכה מחודשת וסיכום מצב מורכב.","actType":"tf","actQ":"מותר ומומלץ להוסיף לדיווח הסיעודי הערות אישיות ומחמיאות על המטופל, כמו למשל: 'המטופל חמוד מאוד, אהבתי אותו', כדי להראות שהקשר הטיפולי היה מוצלח","actData":"","actOpts":[],"actAns":"false"},{"title":"מודל DAR ","type":"steps","content":"שלב 1: D – Data (נתונים) | איסוף נתונים סובייקטיביים ואובייקטיביים הקשורים לבעיה או לאירוע הספציפי.\nשלב 2: A – Action (פעולה) | תיאור ההתערבות הסיעודית או הטיפול שבוצע בפועל (למשל מתן תרופת SOS או הרגעה).\nשלב 3: R – Response (תגובה) | תיעוד תגובת המטופל להתערבות ובחינה האם הושגה הקלה במצבו. \nשלב 4: מתי להשתמש? | אירועים חריגים, התקפי חרדה, שינוי חד במצב הקליני או מתן טיפול SOS.","actType":"tf","actQ":"חל איסור מוחלט לציין בדיווח הסיעודי כי בוצעה התייעצות עם רופא או כי התקבלו הנחיות טלפוניות מרופא","actData":"","actOpts":[],"actAns":"false"},{"title":"מודל PIE","type":"list","content":"P – Problem (בעיה): הגדרה ממוקדת של הבעיה הסיעודית (למשל: חוסר היגיינה על רקע תסמינים שליליים).\nI – Intervention (התערבות): הפעולות שננקטו כדי להתמודד עם הבעיה (למשל: ליווי יזום למקלחת).\nE – Evaluation (הערכה): בחינת תוצאות ההתערבות והמשך המעקב הנדרש.\nמתי להשתמש? | מעקב אחר בעיות כרוניות, תהליכים שיקומיים ממושכים ובחינת היענות לטיפול.","actType":"mcq","actQ":"מתי השימוש במודל ה-PIE (בעיה-התערבות-הערכה) הוא המתאים ביותר?","actData":"","actOpts":["במעקב אחר בעיות כרוניות, בחינת היענות לטיפול ובתהליכים שיקומיים מתמשכים.","רק בעת קבלת מטופל חדש למחלקה לצורך הערכה ראשונית.","במקרים של התפרצות התנהגותית פתאומית הדורשת תיעוד SOS מהיר.","לצורך תיעוד סימנים חיוניים בלבד (לחץ דם ודופק) במהלך משמרת רגילה."],"actAns":""}]},{"title":"דיווח סיעודי בעת שחרור מטופל","desc":"למידת עקרונות התיעוד בנקודת המעבר הרגישה שבין האשפוז לקהילה, להבטחת רצף טיפולי, בטיחות המטופל והגנה משפטית.","subUnits":[{"title":"למה ואיך מתעדים שחרור?","type":"text","content":"מטרות הדיווח: הבטחת רצף טיפולי בקהילה, הכנת המטופל ומשפחתו, הפחתת סיכון להחמרה ושמירה על בטיחות.\nעקרונות הכתיבה: כתיבה עניינית, עובדתית (ללא פרשנות), סדר כרונולוגי, תיעוד מפורש של הדרכה ומסירת תרופות/מסמכים, וציון גורם מלווה.\nהיבט משפטי: הדיווח הוא מסמך קליני-משפטי מחייב המשקף את איכות הטיפול שניתן.","actType":"tf","actQ":"בדיווח השחרור מומלץ להוסיף פרשנות אישית של האחות לגבי התנהגות המטופל כדי להעשיר את המידע","actData":"","actOpts":[],"actAns":"false"},{"title":"מה חייב להופיע בדיווח?","type":"flashcards","content":"מצב המטופל | תיעוד מצב נפשי וגופני, רמת התמצאות, שיפוט, תובנה והערכת מסוכנות.\nהדרכה | פירוט למי ניתנה ההדרכה, תוכנה (תרופות, המשך מעקב, סימני אזהרה) והערכת הבנת המטופל.\nתרופות ומסמכים | ציון סוג התרופות שנמסרו ומשך האספקה, ואישור מסירת מכתב שחרור ומרשמים.\nחפצי ערך וליווי | תיעוד השבת חפצי ערך וציון הגורם המלווה ביציאה מן המחלקה.","actType":"mcq","actQ":"מדוע תיעוד \"הערכת הבנת המטופל\" הוא מרכיב קריטי בדיווח השחרור?","actData":"","actOpts":["כדי להבטיח רצף טיפולי בטוח ולוודא שהמטופל מסוגל ליישם את תוכנית הטיפול בקהילה.","כדי להוכיח שהאחות הקדישה זמן רב למטופל לפני צאתו.","כדי שהרופא בקהילה ידע שהמטופל אינו זקוק להסברים נוספים.","אין לכך חשיבות משפטית, זוהי המלצה אתית בלבד"],"actAns":""},{"title":"מבנה מומלץ לדיווח","type":"list","content":"ראשון: מצב המטופל בעת השחרור (נפשי, גופני ומסוכנות).\nשני: פירוט ההדרכה שניתנה והערכת הבנת המטופל.\nשלישי: תיעוד מסירת תרופות, מסמכים והסבר על המשך מעקב.\nרביעי: השבת חפצי ערך, ציון המלווה ואופן היציאה מהמחלקה.","actType":"tf","actQ":"בדיווח סיעודי בעת שחרור מטופל מאשפוז פסיכיאטרי, חובה לכלול הערכת מסוכנות לעצמו או לאחרים (במידת הצורך) כחלק מתיעוד מצב המטופל","actData":"","actOpts":[],"actAns":"true"},{"title":"דוגמה מלאה לדיווח שחרור","type":"text","content":"המטופל משוחרר לביתו. בהכרה מלאה, מתמצא בזמן ובמקום. מצב רוח יציב. ללא מחשבות אובדניות. שיפוט ותובנה תקינים.\nניתנה הדרכה למטופל ולאחותו לגבי המשך טיפול תרופתי, מינונים ותופעות לוואי אפשריות. הוסברו סימנים המחייבים פנייה דחופה למיון. המטופל ואחותו הביעו הבנה.\nהמטופל צויד בתרופות ל־48 שעות בהתאם להנחיית הרופא.\nמכתב שחרור ומרשמים נמסרו לידיו.\nקיבל חפצי הערך שלו ממזכירות המחלקה.\nיצא בליווי אחותו.\n","actType":"reflect","actQ":"כעובד חדש במחלקה, כאשר אתה מתעד שחרור של מטופל לראשונה, מדוע לדעתך חשוב להקפיד על המבנה המובנה (מצב קליני -> הדרכה -> לוגיסטיקה) במקום לכתוב דיווח חופשי? כיצד סדר זה מסייע לך לוודא שלא שכחת אף פרט קריטי לבטיחותו","actData":"","actOpts":[],"actAns":""}]},{"title":"דיווח סיעודי – קבלת מטופל למלר״ד","desc":"למידת עקרונות התיעוד הראשוני במפגש עם המטופל במיון, בדגש על מיון (טריאז'), אומדן מסוכנות","subUnits":[{"title":"למה ואיך כותבים במיון?","type":"text","content":"מטרת הדיווח: תיעוד מצב המטופל בהגעה, שיקוף מיון ראשוני (טריאז') ואומדן מסוכנות, ותיעוד פעולות סיעודיות ותקשורת עם הצוות הרפואי.\nעקרונות מחייבים: כתיבה עניינית, כרונולוגית, אובייקטיבית (ללא פרשנות) ומבוססת עובדות נצפות.\n\nכלל הזהב: מה שלא תועד – לא בוצע!","actType":"tf","actQ":"בדיווח במלר\"ד מותר להשתמש בביטויים כמו 'מטופל מניפולטיבי' או 'עושה הצגות' כדי להזהיר את הצוות הבא.","actData":"","actOpts":[],"actAns":"false"},{"title":"מבנה הדיווח","type":"flashcards","content":"פרטי הגעה | תיעוד שעה, אופן הגעה (מד\"א, משטרה וכו'), מלווים ומקור הפניה.\nהתרשמות והתנהגות | תיאור הופעה חיצונית, קשר עין, שיתוף פעולה, מצב רגשי וסימני אי-שקט.\nאומדן מסוכנות (חובה!) | תיעוד מפורש של מחשבות אובדניות, תכנית/כוונה, ניסיונות עבר ומסוכנות לאחרים.\nאומדן גופני וכאב | מדדים חיוניים, תלונות גופניות ודירוג כאב לפי דיווח המטופל.","actType":"mcq","actQ":"מה נחשב לליקוי מקצועי חמור בדיווח סיעודי במלר\"ד?","actData":"","actOpts":["היעדר תיעוד מפורש של אומדן מסוכנות","תיעוד הגעה ללא ליווי משפחתי.","אי-תיעוד של אומדן כאב בעת הקבלה.","תיעוד עיכוב של פחות מ-20 דקות בטיפול."],"actAns":""},{"title":"חשיבות תיעוד אומדן מסוכנות במלר\"ד","type":"text","content":"הערכת המסוכנות היא המרכיב הקריטי ביותר בדיווח הסיעודי במיון הפסיכיאטרי. תיעוד זה אינו רק פעולה טכנית, אלא כלי מציל חיים והגנה משפטית מהותית עבור הצוות המטפל.\n\nמה חובה לתעד? \nיש לכתוב במפורש את הנתונים הבאים:\n\nמחשבות אובדניות: האם קיימות מחשבות כרגע?\nתכנית וכוונה: האם למטופל יש תכנית קונקרטית או כוונה מיידית לפעול?\nהיסטוריה: האם היו ניסיונות אובדניים בעבר?\nמסוכנות לאחרים: האם קיים חשש לתוקפנות או פגיעה בסביבה?","actType":"reflect","actQ":"\"כעובד חדש, מדוע לדעתך חשוב לתעד במפורש עיכובים בטיפול או את זמן העדכון של הרופא בדיווח במלר\"ד? כיצד תיעוד זה מגן עליך ועל המטופל?\"","actData":"","actOpts":[],"actAns":""}]},{"title":"קבלת מטופל למחלקה פסיכיאטרית","desc":"קבלת מטופל למחלקה היא רגע מכריע ברצף הטיפולי. הדיווח הראשוני הוא מסמך קליני-משפטי מחייב המבטיח את בטיחות המטופל והצוות ומהווה בסיס לכל תוכנית הטיפול בהמשך.","subUnits":[{"title":"מה חייב להופיע בתיעוד הראשוני?","type":"flashcards","content":"פרטי העברה | תיעוד מועד הכניסה למחלקה וסוג האשפוז (בהסכמה או כפוי).\nמצב המטופל | תיאור אובייקטיבי של התנהגות, רמת שיתוף פעולה, חרדה, מצב רגשי והתמצאות.\nאומדן סיכון | תיעוד מפורש של מחשבות אובדניות, תכנית/כוונה, ניסיונות עבר ומסוכנות לאחרים.\nאנמנזה סיעודית | תיעוד אלרגיות, תרופות קבועות, מחלות רקע, שימוש בחומרים ומערך תמיכה.\nמידע למטופל | תיעוד מתן הסבר על זכויות וחובות, נהלי המחלקה והיכרות עם הצוות.","actType":"mcq","actQ":"מהם מרכיבי החובה שיש לתעד בדיווח הסיעודי בעת קבלת מטופל למחלקה הפסיכיאטרית?","actData":"","actOpts":["מועד כניסה וסוג אשפוז, תיאור אובייקטיבי של מצב המטופל והתנהגותו, אומדן סיכון והנחיות בטיחות, אנמנזה סיעודית מלאה ומידע שנמסר למטופל.","רק את שעת ההגעה ואת רשימת חפצי הערך שהופקדו בכספת המחלקה.","תיאור כללי של המטופל (\"חמוד\", \"משתף פעולה\") וסיכום של דברי הרופא במיון בלבד.","רשימת התרופות שהמטופל אמור לקבל במהלך האשפוז ללא צורך בתיעוד מצבו הרגשי או רמת החרדה שלו."],"actAns":""},{"title":"הגוף בתוך האשפוז הפסיכיאטרי","type":"text","content":"הבדיקה הגופנית בקבלה נועדה לשלול מצב רפואי חריף, לזהות חבלות או סימני אלימות, ולספק הגנה משפטית לצוות.\nמדדים חיוניים: חובה לתעד לחץ דם, דופק וחום. סטורציה וסוכר יבוצעו במידת הצורך.\nסקר גוף מפורט: יש לתעד חבלות, חתכים (כולל פגיעה עצמית), סימני קשירה, מצב היגייני וסימני גמילה.\nדגש משפטי בתיעוד פגיעה: בעת זיהוי ממצא חריג, יש לציין מיקום מדויק, גודל, צבע, צורה ומה אמר המטופל על מקור הפגיעה.\nבדיקת חפצים מסוכנים: תיעוד בדיקה לחפצים כגון סכינים, חבלים, מציתים או כדורים.","actType":"tf","actQ":"כאשר המטופל מגיע עם חבלה טרייה, מספיק לכתוב 'קיימת חבלה בפנים' ללא פירוט נוסף","actData":"","actOpts":[],"actAns":"false"},{"title":"תיעוד חפצי ערך ורכוש","type":"steps","content":"רישום מפורט: אין להשתמש בתיאור כללי. יש לפרט במדויק: \"ארנק שחור\", סכום כסף מזומן מדויק, סוג טלפון נייד וצבעו.\nאופן הטיפול: יש לתעד האם החפצים הופקדו בכספת, הועברו למשפחה או נשארו ברשות המטופל.\nחתימה: חובה להחתים את המטופל ואיש צוות (ועד נוסף במידת הצורך) על טופס ההפקדה.","actType":"reflect","actQ":"כשבדקתי ורשמתי את הציוד בצורה מפורטת כל כך, איך זה השפיע על תחושת הביטחון שלי מול המטופל ועל היכולת שלי להגן על עצמי ועל המערכת מפני אי-הבנות בעתיד?","actData":"","actOpts":[],"actAns":""}]},{"title":"התיעוד בעת הגבלה ובידוד ","desc":"יחידה זו עוסקת בעקרונות התיעוד הסיעודי בעת הגבלה מכאנית ובידוד, תוך הדגשת האחריות המקצועית, תדירות המעקב, ותוכן הדיווח הנדרש. היחידה מדגישה כי התיעוד מהווה מסמך קליני-משפטי המחייב דיוק, רצף כרונולוגי ותיעוד מלא של הסכנה, ההתערבויות והמעקב עד לסיום ההגבלה או הבידוד.","subUnits":[{"title":"איפה ומתי מתעדים?","type":"flashcards","content":"חובת הרישום הכפול | התיעוד חייב להתבצע במקביל בשני מקומות: 1. הרשומה הממוחשבת. 2. פנקס ההגבלות הידני. אי רישום באחד מהם הוא ליקוי חמור.\nתדירות מעקב - הגבלה מכנית | בדיקה ותיעוד לפחות אחת לחצי שעה.\nתדירות מעקב - בידוד | בדיקה ותיעוד לפחות אחת לשעה.\nמה בודקים בכל פעם? | ערנות, שיתוף פעולה, הצורך בהמשך ההגבלה ומצב הגפיים (צבע, תנועתיות, שלמות העור).","actType":"tf","actQ":"מכיוון שהכל מתועד במחשב, אין חובה למלא גם את פנקס ההגבלות הידני במידה והמשמרת עמוסה","actData":"","actOpts":[],"actAns":"false"},{"title":"מה חייב להופיע בסיפור המקרה?","type":"text","content":"הדיווח חייב להיות מפורט וכרונולוגי ולכלול:\n-נסיבות האירוע: תיאור ההתנהגות שהובילה להגבלה (חובת הוכחת סכנה ממשית ומיידית).\n-ניסיונות קודמים: פירוט ניסיונות הרגעה מילוליים (דה-אסקלציה) לפני ההגבלה.\n-הסבר למטופל: תיעוד מתן הסבר על סיבת ההגבלה.\n-יידוע גורמים: עדכון משפחה או אפוטרופוס לפי הנוהל.\n-מענה לצרכים: תיעוד מתן שתייה, מזון, שירותים ושינוי תנוחה.\n-דיווח לרופא: תיעוד כל שינוי ושעת עדכון הרופא.","actType":"mcq","actQ":"מהם מרכיבי החובה שיש לתעד בכל בדיקה תקופתית (כל חצי שעה) של מטופל הנמצא בהגבלה מכאנית?","actData":"","actOpts":["רמת ערנות והכרה, מידת שיתוף פעולה, מצב הגפיים (צבע, בצקת, שלמות עור) ובחינת הצורך בהמשך ההגבלה.","רשימת האוכל שהמטופל אכל בבוקר ושמות אנשי הצוות שנמצאים במשמרת בלבד.","תיעוד כללי שהמטופל \"שקט\" ללא צורך בבדיקה פיזית של הגפיים.","שעת תחילת ההגבלה בלבד, ללא צורך בתיעוד חוזר עד לסיום ההגבלה"],"actAns":""}]},{"title":"תיעוד השגחה, הסתכלות ושמירה מיוחדת","desc":"רמות ההשגחה השונות נועדו להבטיח את בטיחות המטופל וסביבתו. התיעוד הוא ההוכחה היחידה לכך שהמטופל אכן נמצא תחת פיקוח כנדרש בנוהל. \"מה שלא תועד – כאילו לא הושגח\".","subUnits":[{"title":"מתי וכמה מתעדים?","type":"flashcards","content":"שמירה מיוחדת | תיעוד אחת לשעה. בדיקת רופא לפחות כל 8 שעות. מעקב כללי אחר מצב והתנהגות.\nהסתכלות מיוחדת | תיעוד אחת לחצי שעה. האחות יודעת בכל עת היכן המטופל. מבוצעת על ידי אחות.\nהשגחה מיוחדת | תיעוד אחת לחצי שעה. השגחה צמודה ורציפה (1:1). בדיקת רופא לפחות כל 8 שעות.","actType":"mcq","actQ":"כעובד חדש המבצע תיעוד של מטופל ב\"הסתכלות מיוחדת\", מהו הדגש המרכזי שחייב להופיע בדיווח שלך בכל חצי שעה?","actData":"","actOpts":["מיקום המטופל המדויק בכל עת, מצבו הנפשי, תוכן הדיבור ובחינת מסוכנות.","תיעוד כללי של \"המטופל שקט\" מבלי לציין את מיקומו הפיזי במחלקה","העתקה של הדיווח הקודם במידה ולא חל שינוי משמעותי בהתנהגות המטופל.","בדיקת סימנים חיוניים (דופק ולחץ דם) בלבד ללא התייחסות למצב הנפשי."],"actAns":""},{"title":"נוסחת הרישום המומלצת","type":"steps","content":"שעה: זמן הדיווח המדויק.\nמיקום: איפה המטופל נמצא כרגע פיזית?\nמצב נפשי: מהו הסטטוס הרגשי הנראה לעין?\nהתנהגות: מה המטופל עושה ברגע זה?\nתוכן דיבור: מה נאמר בשיחה (אם התקיימה)?\nהתערבות: מה עשיתם עבורו (שיחה, טיפול, הרגעה)?\nתגובה: איך המטופל הגיב להתערבות שלכם?","actType":"reflect","actQ":"דוגמה לדיווח מקצועי:  \"22:00 – בחדר. אי שקט קל. מדווח על מחשבות רדיפה. בוצעה שיחה מרגיעה. נרגע.\"  תכתוב דוגמה נוספת","actData":"","actOpts":[],"actAns":""},{"title":"\"אל תעשו\" – טעויות נפוצות של עובדים חדשים","type":"flashcards","content":"העתקת תיעוד קודם | הסכנה: יצירת מצג שווא של מעקב. אם המטופל נפל או ברח, והתיעוד שלכם הוא \"העתק-הדבק\" משעה קודמת, אתם בבעיה משפטית ובטיחותית חמורה.\nאי ציון מיקום המטופל | הסכנה: המיקום הוא לב הדיווח בהשגחה/הסתכלות. אם לא ציינתם מיקום, לא באמת הוכחתם שידעתם איפה המטופל נמצא.\nאי עמידה בתדירות הנדרשת | הסכנה: \"חור\" של שעה בתיעוד (כשנדרש חצי שעה) נחשב להפקרת השגחה בבית המשפט ובביקורות משרד הבריאות.","actType":"mcq","actQ":"לפניך דיווח של עובד חדש: \"08:00 – המטופל שקט, ללא מחשבות אובדניות, שיתף פעולה עם חלוקת תרופות\". מהי הטעות הקריטית בדיווח זה?","actData":"","actOpts":["לא צוין מיקום המטופל (איפה הוא נמצא בזמן הדיווח?).","הדיווח קצר מדי.","לא צוין מה המטופל אכל בבוקר.","לא צוין לחץ דם."],"actAns":""}]},{"title":"אירוע חריג ו\"כמעט אירוע\"","desc":"בבריאות הנפש, היכולת שלנו לזהות תקלה לפני שהיא הופכת לנזק היא קריטית. ההבדל בין השניים הוא לא בטעות עצמה, אלא בתוצאה שלה.","subUnits":[{"title":"הגדרות היסוד","type":"flashcards","content":"אירוע חריג | כשל בנהלים או בהתנהלות שבו נגרם נזק בפועל (גופני, נפשי או לרכוש) למטופל או לצוות.\nכמעט אירוע (Near Miss) | טעות או חריגה מנהלים שהייתה עלולה לגרום לנזק, אך הנזק נמנע ברגע האחרון בזכות ערנות או בקרה.\nלמה מדווחים על \"כמעט אירוע\"? | כי זו הזדמנות ללמוד על כשל במערכת ולתקן אותו לפני שמישהו ייפגע בפעם הבאה.","actType":"tf","actQ":"דיווח על 'כמעט אירוע' (Near Miss) הוא פחות חשוב מדיווח על 'אירוע חריג', מכיוון שבסופו של דבר לא נגרם נזק בפועל למטופל או לצוות","actData":"","actOpts":[],"actAns":"false"},{"title":"אירוע חריג (התוצאה: נזק בפועל)","type":"text","content":"\nהגדרה: אירוע שבו הכשל המערכתי או האנושי לא נעצר, והוביל לנזק גופני, נפשי או רכושי.\n\nדוגמאות מהשטח:\nבתחום התרופות: מטופל קיבל בטעות תרופה שאינה שלו. התוצאה: צניחת לחץ דם וצורך בטיפול דחוף.\n\nבתחום הבטיחות: דלת המחלקה נשארה פתוחה עקב תקלה. התוצאה: המטופל יצא מהמחלקה ללא אישור והסתובב לבדו בחוץ.\n\nבתחום האלימות: המטופל מצא בורג משוחרר במיטתו. התוצאה: פצע את עצמו בזרוע ונזקק לתפרים.\n\nבתחום הזיהוי: בוצעה דקירה ולקיחת דם למטופל הלא נכון. התוצאה: דגימה שגויה נשלחה למעבדה (סיכון לטיפול שגוי).","actType":"tf","actQ":"במהלך חלוקת תרופות, אחות הבחינה כי הכינה מזרק עם מינון כפול מהנדרש עבור מטופל. היא עצרה את הפעולה, רוקנה את המזרק והכינה מינון חדש ותקין טרם ההזרקה למטופל. האם מקרה זה יוגדר כ\"אירוע חריג\"?","actData":"","actOpts":[],"actAns":"false"},{"title":"כמעט אירוע (התוצאה: נמנע נזק)","type":"text","content":"\nהגדרה: אירוע שבו אירעה טעות, אך היא נעצרה בזמן (\"ברגע האחרון\") בזכות ערנות, בדיקה כפולה או מזל.\n\nדוגמאות מהשטח:\nבתחום התרופות: האחות הכינה תרופה למטופל הלא נכון, אך בבדיקת הפרטים המזהים ליד המיטה גילתה את הטעות והחליפה את התרופה.\n\nבתחום הבטיחות: איש צוות הרגיש שהדלת לא ננעלת. הוא לא עזב את המקום ודיווח מיד לתיקון – המטופלים נשארו מוגנים.\n\nבתחום האלימות: במהלך סיבוב בוקר שגרתי, האחות זיהתה בורג בולט במיטה. הבורג הוסר והמיטה תוקנה לפני שהמטופל נפגע.\n\nבתחום הזיהוי: האחות ביקשה תעודת זהות לפני דקירת המטופל. היא גילתה שהשם על המבחנה שונה וצירפה מבחנה חדשה לפני הביצוע.","actType":"reflect","actQ":"לפניך משפט, השלם אותו לפי הבנתך:  \"ההבדל בין אירוע חריג לבין כמעט אירוע הוא לא עצם הטעות שקרתה, אלא ה________","actData":"","actOpts":[],"actAns":""}]},{"title":"סימני פיסוק – הדיוק שמאחורי המילים","desc":"בדיווח סיעודי, סימן פיסוק קטן יכול לשנות משמעות של משפט שלם. פיסוק נכון מונע אי-הבנות, מקל על רצף הקריאה ומשקף סדר וחשיבה קלינית מובנית.","subUnits":[{"title":"מדריך סימני הפיסוק בדיווח","type":"flashcards","content":"נקודה (.) | המטרה: סיום מחשבה שלמה. בדיווח קליני נעדיף משפטים קצרים ועובדתיים. משפטים ארוכים מדי עלולים לבלבל.\nפסיק (,) | המטרה: הפרדה בתוך המשפט. משמש לפני מילות קישור (אך, אבל, ולכן), ברשימת תסמינים, או לאחר ביטוי פתיחה.\nנקודתיים (:) | המטרה: הצגת פירוט או ציטוט. לדוגמה: \"נצפו התסמינים הבאים: רעד והזעה\" או \"המטופל אמר: ...\".\nמירכאות (\" \") | המטרה: ציטוט מדויק של דברי המטופל. יש לרשום את הדברים כלשונם ללא תיקון לשוני. למשל: המטופל אמר: \"אני שומע קולות\".\nסוגריים ( ) | המטרה: הוספת מידע משלים שאינו עיקר המשפט, כמו מינון תרופה (2 מ\"ג) או נתון מדיד (לחץ דם).","actType":"tf","actQ":"יש להשתמש בפסיק (,) לפני מילות קישור כמו \"אך\", \"אבל\" ו\"למרות זאת\".","actData":"","actOpts":[],"actAns":"true"},{"title":"כוחם  של  סימני  פיסוק","type":"text","content":"כוחה של הנקודה: מניעת עומס ובלבול\nכאשר אין נקודות, האירועים נראים כמו רצף אחד מלחיץ שקשה להבין בו מה גרם למה.\nהניסוח הבעייתי (ללא נקודות):\n\"המטופל נכנס לחדר האוכל והתחיל לצעוק על איש צוות ואיים שיכה אותו ואז יצא לחצר ונרגע לאחר שיחה קצרה וסירב לקחת טיפול SOS שהוצע לו\"\nהניסוח המקצועי (עם נקודות):\n\"המטופל נכנס לחדר האוכל והחל לצעוק על איש צוות תוך איומים באלימות פיזית. לאחר מכן יצא לחצר. בשיחה קצרה נרגע, אך סירב ליטול טיפול SOS שהוצע לו.\"\nלמה זה חשוב? הנקודות מפרידות בין האירוע האלים לבין התגובה לטיפול. זה מאפשר לזהות בקלות שהמטופל נרגע מילולית אך עדיין לא מאוזן תרופתית.\n\n2. כוחן של המירכאות: דיוק מול פרשנות\nבבריאות הנפש, יש הבדל עצום בין מה שהאחות חושבת לבין מה שהמטופל אומר.\nהניסוח הבעייתי (פרשנות):\nהמטופל חושב שכולם נגדו ורוצים להרע לו במחלקה ולכן הוא מפחד.\nהניסוח המקצועי (ציטוט במירכאות):\nהמטופל מביע חשדנות כלפי הצוות. אמר: \"אני יודע ששמתם לי רעל באוכל, אתם רוצים לגמור אותי\".\nלמה זה חשוב? המירכאות מוכיחות שהמטופל סובל ממחשבות שווא (דלוזיות) קונקרטיות. הניסוח הראשון הוא רק התרשמות, הניסוח השני הוא עובדה קלינית מוצקה.\n\n3. כוחם של הנקודתיים והפסיק: סדר ברשימת תסמינים\nכשמדובר בבטיחות, אנחנו רוצים רשימה מסודרת ולא \"סלט\" של מילים.\nהניסוח הבעייתי:\nלמטופל יש רעד בידיים והוא מזיע ויש לו דופק מהיר והוא אומר שהוא מרגיש חנוק.\nהניסוח המקצועי:\nנצפו תסמינים גופניים חריגים: רעד בידיים, הזעה מוגברת ודופק מהיר. בנוסף, המטופל מדווח: \"אני מרגיש חנק\".\nלמה זה חשוב? שימוש בנקודתיים (:) יוצר הכנה לרשימה, והפסיקים מפרידים בין הממצאים. כך הרופא יכול לסרוק את הדיווח ב-2 שניות ולהבין שיש כאן אירוע רפואי (אולי התקף חרדה או תופעת לוואי).","actType":"tf","actQ":"כאשר מצטטים את דברי המטופל (למשל: \"אני שומע קולות\"), יש להשתמש במירכאות ולרשום את הדברים בדיוק כפי שנאמרו.","actData":"","actOpts":[],"actAns":"true"}]}],"exam":[{"text":"מהי המשמעות המרכזית של הרשומה הסיעודית?","opts":["מסמך קליני ומשפטי מחייב","מסמך פנימי להעברת מידע בלבד","כלי אדמיניסטרטיבי לניהול משמרת","סיכום יומי לצרכי הנהלה"]},{"text":"על פי חוק זכויות החולה (סעיף 17), חובה לתעד","opts":["מהלך טיפול, אבחנות, הוראות, התערבויות ומצב קליני","רק מתן תרופות","רק אבחנה רפואית","רק תלונות המטופל"]},{"text":"מה קובע עקרון \"מה שלא תועד – לא בוצע\"?","opts":["פעולה שלא תועדה תיחשב כאילו לא בוצעה","ניתן להשלים תיעוד בדיעבד ללא ציון","תיעוד הוא בגדר המלצה בלבד","אין חשיבות לסדר כרונולוגי"]},{"text":"איזה מהבאים מהווה תיעוד אובייקטיבי תקין?","opts":["המטופל צעק והכה בדלת החדר","המטופל אלים מאוד","המטופל מניפולטיבי","המטופל בעייתי"]},{"text":"מודל SOAP מתאים במיוחד ל:","opts":["הערכה ראשונית וסיכום מצב מורכב","תיעוד אירוע תרופתי קצר","רישום חפצי ערך","תיעוד השגחה מיוחדת"]},{"text":"בדיווח שחרור חובה לציין:","opts":["מצב המטופל, הדרכה, תרופות, מסמכים וחפצי ערך","רק חתימת רופא","רק תרופות","רק מצב נפשי"]},{"text":"בעת קבלת מטופל למלר״ד יש לתעד במפורש:","opts":["אומדן מסוכנות","רק תלונת המטופל","רק מדדים חיוניים","רק מקור הפניה"]},{"text":"בתיעוד חפצי ערך נכון לכתוב:","opts":["ארנק שחור, 230 ₪, תעודת זהות, טלפון Samsung כחול","נלקחו חפצים","הופקד רכוש","ציוד אישי"]},{"text":"בהסתכלות מיוחדת יש לתעד:","opts":["אחת לחצי שעה","אחת לשעתיים","פעם במשמרת","רק אם יש שינוי"]},{"text":"מתי משתמשים בנקודתיים (:) בדיווח?","opts":["לפני פירוט או רשימה","בסיום כל משפט","לפני כל מילה חשובה","במקום פסיק"]}]};

    let state = {
      screen: 'intro', // intro, unit, exam, examResult, outro
      unitIdx: 0,
      subIdx: 0,
      answers: [],
      examScores: [],
      completedActivities: new Set()
    };

    const themes = [
      { accent: '#4f46e5', accent2: '#818cf8', soft: '#eef2ff', cardBg: '#ffffff', cardBorder: '#e2e8f0' },
      { accent: '#ea580c', accent2: '#fb923c', soft: '#ffedd5', cardBg: '#fff7ed', cardBorder: '#fed7aa' },
      { accent: '#16a34a', accent2: '#4ade80', soft: '#dcfce7', cardBg: '#f0fdf4', cardBorder: '#bbf7d0' },
      { accent: '#db2777', accent2: '#f472b6', soft: '#fce7f3', cardBg: '#fdf2f8', cardBorder: '#fbcfe8' },
      { accent: '#0284c7', accent2: '#38bdf8', soft: '#e0f2fe', cardBg: '#f0f9ff', cardBorder: '#bae6fd' },
    ];

    const unitIcons = [
      // Simple inline SVG icons (no external libraries)
      `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-8-4.5-8-11a5 5 0 0 1 9-3a5 5 0 0 1 9 3c0 6.5-8 11-8 11z"/></svg>`,
      `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/><path d="M6.5 2H20v20"/><path d="M6.5 2A2.5 2.5 0 0 0 4 4.5v15"/></svg>`,
      `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M12 4h9"/><path d="M4 9h16"/><path d="M4 15h16"/></svg>`,
      `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M12 3v18"/><path d="M7 7h10v10H7z"/></svg>`,
      `<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.5 6.5L21 9l-5 4 1.5 7-5.5-3.5L6.5 20 8 13 3 9l6.5-.5L12 2z"/></svg>`
    ];

    function applyThemeByUnit(unitIdx) {
      const t = themes[unitIdx % themes.length];
      document.documentElement.style.setProperty('--accent', t.accent);
      document.documentElement.style.setProperty('--accent2', t.accent2);
      document.documentElement.style.setProperty('--soft', t.soft);
      document.documentElement.style.setProperty('--card-bg', t.cardBg);
      document.documentElement.style.setProperty('--card-border', t.cardBorder);
    }

    function renderSidebar() {
      const el = document.getElementById('sidebarList');
      if (!el) return;

      el.innerHTML = moduleData.units.map((u, idx) => {
        const icon = unitIcons[idx % unitIcons.length];
        return `
          <button class="side-item w-full text-right" data-unit="${idx}" onclick="jumpToUnit(${idx})">
            <div class="side-icon">${icon}</div>
            <div class="min-w-0 flex-1">
              <div class="side-title truncate">${u.title}</div>
              <div class="side-sub">${u.subUnits.length} תתי-נושאים</div>
            </div>
            <div class="accent-pill opacity-0" data-dot="${idx}"></div>
          </button>
        `;
      }).join('');
      updateSidebarActive();
    }

    function updateSidebarActive() {
      const items = document.querySelectorAll('[data-unit]');
      items.forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('[data-dot]').forEach(d => d.classList.add('opacity-0'));

      if (state.screen === 'unit') {
        const active = document.querySelector(`[data-unit="${state.unitIdx}"]`);
        const dot = document.querySelector(`[data-dot="${state.unitIdx}"]`);
        if (active) active.classList.add('active');
        if (dot) dot.classList.remove('opacity-0');
      }
    }

    function jumpToUnit(idx) {
      state.screen = 'unit';
      state.unitIdx = idx;
      state.subIdx = 0;
      window.scrollTo(0,0);
      render();
    }

    function updateProgressUI(progress01) {
      const pct = Math.round(progress01 * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';
      // SVG circle uses dasharray in percentage units (0..100)
      document.getElementById('progressCircle').setAttribute('stroke-dasharray', `${pct} 100`);
    }

    function render() {
      // Theme based on current unit (or first theme on intro/outro)
      const themeIdx = (state.screen === 'unit') ? state.unitIdx : 0;
      applyThemeByUnit(themeIdx);

      const app = document.getElementById('app');
      const progress01 = calculateProgress();
      updateProgressUI(progress01);
      updateSidebarActive();

      if (state.screen === 'intro') {
        app.innerHTML = `
          <div class="module-card p-8 md:p-12 text-center space-y-8">
            <div class="w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-6" style="background: var(--soft); border: 1px solid rgba(0,0,0,0.04);">
              <svg class="w-12 h-12" style="color: var(--accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
              </svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900">${moduleData.intro.title}</h1>
            <p class="text-xl text-slate-600 leading-relaxed whitespace-pre-wrap">${moduleData.intro.text}</p>
            <button onclick="nextStep()" class="btn-primary w-full md:w-auto px-12 py-4 text-white text-xl font-bold rounded-2xl shadow-xl transition-all hover:-translate-y-1">${moduleData.intro.btn}</button>
          </div>`;
      } else if (state.screen === 'unit') {
        const unit = moduleData.units[state.unitIdx];
        const sub = unit.subUnits[state.subIdx];
        app.innerHTML = `
          <div class="space-y-6">
            <div class="flex justify-between items-center text-sm font-bold text-slate-400">
              <span>יחידה ${state.unitIdx + 1}: ${unit.title}</span>
              <span>${state.subIdx + 1} / ${unit.subUnits.length}</span>
            </div>

            <div class="module-card p-8 md:p-10 space-y-8">
              <div class="flex items-start gap-3">
                <div class="w-12 h-12 rounded-2xl grid place-items-center" style="background: var(--soft); border: 1px solid rgba(0,0,0,0.04);">
                  ${unitIcons[state.unitIdx % unitIcons.length]}
                </div>
                <div class="min-w-0">
                  <h2 class="text-3xl font-black text-slate-900">${sub.title}</h2>
                  <div class="mt-1 text-sm font-bold" style="color: var(--accent);">${unit.desc}</div>
                </div>
              </div>

              <div class="content-view text-lg leading-relaxed text-slate-700">
                ${renderContent(sub)}
              </div>

              <div class="activity-section p-6 rounded-2xl border" style="background: rgba(255,255,255,0.6); border-color: var(--card-border);">
                <h3 class="text-sm font-black uppercase tracking-widest mb-4" style="color: var(--accent);">בדיקת הבנה</h3>
                ${renderActivity(sub, `${state.unitIdx}-${state.subIdx}`)}
              </div>

              <div class="flex gap-4">
                <button onclick="prevStep()" class="flex-1 py-4 border-2 border-slate-200 rounded-xl font-bold text-slate-500 hover:bg-slate-50 transition-all">הקודם</button>
                <button id="nextBtn" onclick="nextStep()" class="flex-[2] py-4 rounded-xl font-bold shadow-lg text-white btn-primary transition-all">המשך</button>
              </div>
            </div>
          </div>`;
      } else if (state.screen === 'exam') {
        app.innerHTML = `
          <div class="module-card p-8 md:p-12 space-y-8">
            <div class="text-center">
              <h2 class="text-3xl font-black">מבחן מסכם</h2>
              <p class="text-slate-500">בואו נראה מה למדנו...</p>
            </div>

            <div class="space-y-12">
              ${moduleData.exam.map((q, i) => `
                <div class="space-y-4">
                  <p class="font-bold text-lg">${i+1}. ${q.text}</p>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    ${shuffle(q.opts.map((o, oi) => `
                      <button onclick="setExamAnswer(${i}, ${oi === 0}, this)" class="exam-q-${i} text-right p-4 border-2 border-slate-100 rounded-xl transition-all hover:translate-y-[-1px]" style="background: white;">
                        ${o}
                      </button>
                    `)).join('')}
                  </div>
                </div>
              `).join('')}
            </div>

            <button onclick="finishExam()" class="w-full py-5 text-white text-xl font-black rounded-2xl shadow-xl btn-primary">סיים מבחן</button>
          </div>`;
      } else if (state.screen === 'examResult') {
        const score = calculateScore();
        const passed = score >= 70;
        app.innerHTML = `
          <div class="module-card p-12 text-center space-y-8">
            <div class="text-7xl mb-4">${passed ? '🎉' : '😕'}</div>
            <h2 class="text-4xl font-black">${passed ? 'כל הכבוד!' : 'לא נורא, ננסה שוב'}</h2>
            <div class="text-6xl font-black" style="color: var(--accent);">${score}%</div>
            <p class="text-xl text-slate-500">${passed ? 'עברת את המבחן בהצלחה.' : 'כדאי לחזור על החומר ולנסות שוב.'}</p>
            <div class="flex flex-col gap-4">
              ${!passed ? `<button onclick="state.screen='unit'; state.unitIdx=0; state.subIdx=0; render()" class="py-4 bg-slate-900 text-white rounded-2xl font-bold">חזרה ללמידה</button>` : ''}
              <button onclick="nextStep()" class="py-4 text-white rounded-2xl font-bold btn-primary">המשך לסיום</button>
            </div>
          </div>`;
      } else if (state.screen === 'outro') {
        app.innerHTML = `
          <div class="module-card p-12 text-center space-y-8">
            <h1 class="text-4xl font-black text-slate-900">${moduleData.outro.title}</h1>
            <p class="text-xl text-slate-600 leading-relaxed whitespace-pre-wrap">${moduleData.outro.text}</p>
            <button onclick="window.location.reload()" class="w-full md:w-auto px-12 py-4 text-white text-xl font-bold rounded-2xl shadow-xl btn-primary">${moduleData.outro.btn}</button>
          </div>`;
      }
    }

    function renderContent(sub) {
      if (sub.type === 'text') return `<p class="whitespace-pre-wrap">${sub.content}</p>`;
      if (sub.type === 'list') {
        return `<ul class="space-y-4">${sub.content.split('\n').map(item => `
          <li class="flex items-start gap-3">
            <span class="w-2 h-2 mt-2 rounded-full shrink-0" style="background: var(--accent);"></span>
            <span>${item}</span>
          </li>
        `).join('')}</ul>`;
      }
      if (sub.type === 'flashcards') {
        return `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${sub.content.split('\n').map(line => {
          const [front, back] = line.split('|');
          return `<div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="flashcard-inner">
              <div class="flashcard-front">${front || ''}</div>
              <div class="flashcard-back">${back || ''}</div>
            </div>
          </div>`;
        }).join('')}</div>`;
      }
      if (sub.type === 'steps') {
        return `<div class="space-y-8">${sub.content.split('\n').map((line, i) => {
          const [title, desc] = line.split('|');
          return `<div class="flex gap-6">
            <div class="shrink-0"><div class="step-bubble">${i+1}</div></div>
            <div>
              <h4 class="font-bold text-xl mb-1">${title || ''}</h4>
              <p class="text-slate-500">${desc || ''}</p>
            </div>
          </div>`;
        }).join('')}</div>`;
      }
      return '';
    }

    function renderActivity(sub, id) {
      if (sub.actType === 'mcq') {
        return `<div class="space-y-4">
          <p class="font-bold">${sub.actQ}</p>
          <div class="grid grid-cols-1 gap-2">
            ${shuffle(sub.actOpts.map((o, i) => `
              <button onclick="checkActivityAns(this, ${i === 0}, '${id}')" class="option-btn p-4 text-right rounded-xl">${o}</button>
            `)).join('')}
          </div>
        </div>`;
      }
      if (sub.actType === 'tf') {
        return `<div class="space-y-4">
          <p class="font-bold">${sub.actQ}</p>
          <div class="grid grid-cols-2 gap-4">
            <button onclick="checkActivityAns(this, ${sub.actAns==='true'}, '${id}')" class="option-btn p-4 rounded-xl font-bold">נכון</button>
            <button onclick="checkActivityAns(this, ${sub.actAns==='false'}, '${id}')" class="option-btn p-4 rounded-xl font-bold">לא נכון</button>
          </div>
        </div>`;
      }
      if (sub.actType === 'reflect') {
        return `<div class="space-y-4">
          <p class="font-bold">${sub.actQ}</p>
          <textarea oninput="state.completedActivities.add('${id}')" class="w-full p-4 border rounded-xl" placeholder="כתבו כאן את מחשבותיכם..."></textarea>
        </div>`;
      }
      return '<p class="text-slate-400">עברו על התוכן והמשיכו הלאה.</p>';
    }

    function checkActivityAns(btn, isCorrect, id) {
      const container = btn.parentElement;
      container.querySelectorAll('button').forEach(b => b.classList.remove('correct', 'wrong'));
      if (isCorrect) {
        btn.classList.add('correct');
        state.completedActivities.add(id);
      } else {
        btn.classList.add('wrong');
      }
    }

    function setExamAnswer(qIdx, isCorrect, btn) {
      state.examScores[qIdx] = isCorrect;
      document.querySelectorAll('.exam-q-' + qIdx).forEach(b => {
        b.classList.remove('text-white');
        b.style.background = 'white';
        b.style.borderColor = '#e2e8f0';
      });
      btn.classList.add('text-white');
      btn.style.background = 'var(--accent)';
      btn.style.borderColor = 'transparent';
    }

    function calculateScore() {
      const correct = state.examScores.filter(s => s === true).length;
      return Math.round((correct / moduleData.exam.length) * 100);
    }

    function finishExam() {
      if (state.examScores.filter(x => x !== undefined).length < moduleData.exam.length) {
        alert('יש לענות על כל השאלות לפני סיום המבחן');
        return;
      }
      state.screen = 'examResult';
      render();
    }

    function nextStep() {
      if (state.screen === 'intro') {
        state.screen = 'unit';
      } else if (state.screen === 'unit') {
        const unit = moduleData.units[state.unitIdx];
        if (state.subIdx < unit.subUnits.length - 1) {
          state.subIdx++;
        } else if (state.unitIdx < moduleData.units.length - 1) {
          state.unitIdx++;
          state.subIdx = 0;
        } else {
          state.screen = moduleData.exam.length > 0 ? 'exam' : 'outro';
        }
      } else if (state.screen === 'examResult') {
        state.screen = 'outro';
      }
      window.scrollTo(0,0);
      render();
    }

    function prevStep() {
      if (state.screen === 'unit') {
        if (state.subIdx > 0) {
          state.subIdx--;
        } else if (state.unitIdx > 0) {
          state.unitIdx--;
          state.subIdx = moduleData.units[state.unitIdx].subUnits.length - 1;
        } else {
          state.screen = 'intro';
        }
      }
      window.scrollTo(0,0);
      render();
    }

    function calculateProgress() {
      if (state.screen === 'intro') return 0;
      if (state.screen === 'outro') return 1;
      const totalUnits = moduleData.units.length;
      if (state.screen === 'exam' || state.screen === 'examResult') return 0.92;
      const currentPos = state.unitIdx + (state.subIdx / moduleData.units[state.unitIdx].subUnits.length);
      return (currentPos / totalUnits) * 0.9;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    renderSidebar();
    render();
  </script>
</body>
</html>
